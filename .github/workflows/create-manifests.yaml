name: Create Docker Manifests

on:
  workflow_call:
    inputs:
      build-type:
        description: "Type of build (prod or dev)"
        required: true
        type: string
      version:
        description: "Version tag for production builds (ignored for dev)"
        required: false
        type: string
    secrets:
      DOCKERHUB_USERNAME:
        required: true
      DOCKERHUB_TOKEN:
        required: true

permissions:
  contents: read
  packages: write

jobs:
  manifest:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Checkout code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          fetch-depth: 0

      - name: Login to Docker Hub
        uses: docker/login-action@ba754150c9dbbaa912ae0ac3cfba43f84195cef2
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@ba754150c9dbbaa912ae0ac3cfba43f84195cef2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Create Docker manifests for dev
        if: ${{ inputs.build-type == 'dev' }}
        run: |
          docker buildx imagetools create -t kulabun/watchtower:latest-dev \
            kulabun/watchtower:amd64-dev \
            kulabun/watchtower:i386-dev \
            kulabun/watchtower:armhf-dev \
            kulabun/watchtower:arm64v8-dev \
            kulabun/watchtower:riscv64-dev
          docker buildx imagetools create -t ghcr.io/kulabun/watchtower:latest-dev \
            ghcr.io/kulabun/watchtower:amd64-dev \
            ghcr.io/kulabun/watchtower:i386-dev \
            ghcr.io/kulabun/watchtower:armhf-dev \
            ghcr.io/kulabun/watchtower:arm64v8-dev \
            ghcr.io/kulabun/watchtower:riscv64-dev

      - name: Create Docker manifests for prod
        if: ${{ inputs.build-type == 'prod' }}
        run: |
          # Strip the 'v' prefix from inputs.version
          VERSION="${{ inputs.version }}"
          VERSION="${VERSION#v}"
          MAJOR=$(echo "$VERSION" | cut -d. --fields=1)
          MINOR=$(echo "$VERSION" | cut -d. --fields=1,2)
          docker buildx imagetools create -t "kulabun/watchtower:${VERSION}" \
            "kulabun/watchtower:amd64-${VERSION}" \
            "kulabun/watchtower:i386-${VERSION}" \
            "kulabun/watchtower:armhf-${VERSION}" \
            "kulabun/watchtower:arm64v8-${VERSION}" \
            "kulabun/watchtower:riscv64-${VERSION}"
          docker buildx imagetools create -t "kulabun/watchtower:${MINOR}" \
            "kulabun/watchtower:amd64-${MINOR}" \
            "kulabun/watchtower:i386-${MINOR}" \
            "kulabun/watchtower:armhf-${MINOR}" \
            "kulabun/watchtower:arm64v8-${MINOR}" \
            "kulabun/watchtower:riscv64-${MINOR}"
          docker buildx imagetools create -t "kulabun/watchtower:${MAJOR}" \
            "kulabun/watchtower:amd64-${MAJOR}" \
            "kulabun/watchtower:i386-${MAJOR}" \
            "kulabun/watchtower:armhf-${MAJOR}" \
            "kulabun/watchtower:arm64v8-${MAJOR}" \
            "kulabun/watchtower:riscv64-${MAJOR}"
          docker buildx imagetools create -t "kulabun/watchtower:latest" \
            "kulabun/watchtower:amd64-latest" \
            "kulabun/watchtower:i386-latest" \
            "kulabun/watchtower:armhf-latest" \
            "kulabun/watchtower:arm64v8-latest" \
            "kulabun/watchtower:riscv64-latest"
          docker buildx imagetools create -t "ghcr.io/kulabun/watchtower:${VERSION}" \
            "ghcr.io/kulabun/watchtower:amd64-${VERSION}" \
            "ghcr.io/kulabun/watchtower:i386-${VERSION}" \
            "ghcr.io/kulabun/watchtower:armhf-${VERSION}" \
            "ghcr.io/kulabun/watchtower:arm64v8-${VERSION}" \
            "ghcr.io/kulabun/watchtower:riscv64-${VERSION}"
          docker buildx imagetools create -t "ghcr.io/kulabun/watchtower:${MINOR}" \
            "ghcr.io/kulabun/watchtower:amd64-${MINOR}" \
            "ghcr.io/kulabun/watchtower:i386-${MINOR}" \
            "ghcr.io/kulabun/watchtower:armhf-${MINOR}" \
            "ghcr.io/kulabun/watchtower:arm64v8-${MINOR}" \
            "ghcr.io/kulabun/watchtower:riscv64-${MINOR}"
          docker buildx imagetools create -t "ghcr.io/kulabun/watchtower:${MAJOR}" \
            "ghcr.io/kulabun/watchtower:amd64-${MAJOR}" \
            "ghcr.io/kulabun/watchtower:i386-${MAJOR}" \
            "ghcr.io/kulabun/watchtower:armhf-${MAJOR}" \
            "ghcr.io/kulabun/watchtower:arm64v8-${MAJOR}" \
            "ghcr.io/kulabun/watchtower:riscv64-${MAJOR}"
          docker buildx imagetools create -t "ghcr.io/kulabun/watchtower:latest" \
            "ghcr.io/kulabun/watchtower:amd64-latest" \
            "ghcr.io/kulabun/watchtower:i386-latest" \
            "ghcr.io/kulabun/watchtower:armhf-latest" \
            "ghcr.io/kulabun/watchtower:arm64v8-latest" \
            "ghcr.io/kulabun/watchtower:riscv64-latest"
