name: Build and Publish

on:
  push:
    branches:
      - main
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"

permissions:
  contents: write
  packages: write
  attestations: write
  id-token: write

jobs:
  build-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Harden the runner
        uses: step-security/harden-runner@8d3c67de8e2fe68ef647c8db1e6a09f647780f40 # v2.19.0
        with:
          egress-policy: audit

      - name: Set Build Type
        id: build_type
        run: |
          if [[ "${{ github.ref_type }}" == "tag" ]]; then
            echo "type=prod" >> $GITHUB_OUTPUT
            echo "version=${{ github.ref_name }}" >> $GITHUB_OUTPUT
          else
            echo "type=dev" >> $GITHUB_OUTPUT
            echo "version=latest" >> $GITHUB_OUTPUT
          fi

      - name: Checkout code
        uses: actions/checkout@0c366fd6a839edf440554fa01a7085ccba70ac98
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c
        with:
          go-version-file: "go.mod"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@f4e8deed0c3c26542279f4042c0e1d059cbf012d
        with:
          platforms: linux/amd64,linux/386,linux/arm/v6,linux/arm64/v8,linux/riscv64

      - name: Enable containerd snapshotter
        run: |
          sudo bash -c 'echo "{\"features\": {\"containerd-snapshotter\": true}}" > /etc/docker/daemon.json'
          sudo systemctl restart docker

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@21162887f0d6e25b4e8eafb0cf44cf9bf7f6acd3
        with:
          driver: docker-container
          platforms: linux/amd64,linux/386,linux/arm/v6,linux/arm64/v8,linux/riscv64
          use: true
          driver-opts: network=host

      - name: Install Syft for SBOM generation
        if: steps.build_type.outputs.type == 'prod'
        run: curl -sSfL https://raw.githubusercontent.com/anchore/syft/main/install.sh | sh -s -- -b /usr/local/bin

      - name: Login to GHCR
        uses: docker/login-action@ba754150c9dbbaa912ae0ac3cfba43f84195cef2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@01cbe076be10ba0af7b0b9319ac490a93d3d2fcd
        with:
          distribution: goreleaser
          version: "~> v2"
          args: release --config build/goreleaser/${{ steps.build_type.outputs.type }}.yml ${{ steps.build_type.outputs.type == 'dev' && '--snapshot' || '' }} --clean
        env:
          GITHUB_TOKEN: ${{ github.token }}
          DRY_RUN: "false"

      - name: Generate artifact attestation
        if: steps.build_type.outputs.type == 'prod'
        uses: actions/attest-build-provenance@10334b5f1e684784025c3fc0a277c88c19089275
        with:
          subject-checksums: ./dist/checksums.txt

      - name: Create Docker manifests for dev
        if: steps.build_type.outputs.type == 'dev'
        run: |
          docker buildx imagetools create -t ghcr.io/kulabun/watchtower:latest \
            ghcr.io/kulabun/watchtower:amd64-latest \
            ghcr.io/kulabun/watchtower:i386-latest \
            ghcr.io/kulabun/watchtower:armhf-latest \
            ghcr.io/kulabun/watchtower:arm64v8-latest \
            ghcr.io/kulabun/watchtower:riscv64-latest

      - name: Create Docker manifests for prod
        if: steps.build_type.outputs.type == 'prod'
        run: |
          VERSION="${{ steps.build_type.outputs.version }}"
          VERSION="${VERSION#v}"
          MAJOR=$(echo "$VERSION" | cut -d. --fields=1)
          MINOR=$(echo "$VERSION" | cut -d. --fields=1,2)
          docker buildx imagetools create -t "ghcr.io/kulabun/watchtower:${VERSION}" \
            "ghcr.io/kulabun/watchtower:amd64-${VERSION}" \
            "ghcr.io/kulabun/watchtower:i386-${VERSION}" \
            "ghcr.io/kulabun/watchtower:armhf-${VERSION}" \
            "ghcr.io/kulabun/watchtower:arm64v8-${VERSION}" \
            "ghcr.io/kulabun/watchtower:riscv64-${VERSION}"
          docker buildx imagetools create -t "ghcr.io/kulabun/watchtower:${MINOR}" \
            "ghcr.io/kulabun/watchtower:amd64-${MINOR}" \
            "ghcr.io/kulabun/watchtower:i386-${MINOR}" \
            "ghcr.io/kulabun/watchtower:armhf-${MINOR}" \
            "ghcr.io/kulabun/watchtower:arm64v8-${MINOR}" \
            "ghcr.io/kulabun/watchtower:riscv64-${MINOR}"
          docker buildx imagetools create -t "ghcr.io/kulabun/watchtower:${MAJOR}" \
            "ghcr.io/kulabun/watchtower:amd64-${MAJOR}" \
            "ghcr.io/kulabun/watchtower:i386-${MAJOR}" \
            "ghcr.io/kulabun/watchtower:armhf-${MAJOR}" \
            "ghcr.io/kulabun/watchtower:arm64v8-${MAJOR}" \
            "ghcr.io/kulabun/watchtower:riscv64-${MAJOR}"
          docker buildx imagetools create -t "ghcr.io/kulabun/watchtower:latest" \
            "ghcr.io/kulabun/watchtower:amd64-latest" \
            "ghcr.io/kulabun/watchtower:i386-latest" \
            "ghcr.io/kulabun/watchtower:armhf-latest" \
            "ghcr.io/kulabun/watchtower:arm64v8-latest" \
            "ghcr.io/kulabun/watchtower:riscv64-latest"
